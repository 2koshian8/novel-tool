<!DOCTYPE html>
<html>
    <style>

body{
    background-color:#f5f5f5;
    font-family:"Yu Gothic";
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    color:#2c3e50;
}

.status{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.done{
    background:#d4f8d4;
    color:#1f7a1f;
}

.writing{
    background:#fff3c4;
    color:#8a6500;
}

.notyet{
    background:#ffd6d6;
    color:#a10000;
}
.cover-done {
    color: #28a745;
    font-weight: bold;
}

.cover-notyet {
    color: #dc3545;
    font-weight: bold;
}
.text-writing {
    color: #ffc107;
    font-weight: bold;
}

.text-done {
    color: #28a745;
    font-weight: bold;
}
.reserve-done {
    color: #28a745;
    font-weight: bold;
}

.reserve-notyet {
    color: #dc3545;
    font-weight: bold;
}
.pixiv-public {
    color: #28a745;
    font-weight: bold;
}

.pixiv-private {
    color: #dc3545;
    font-weight: bold;
}
.schedule-set {
    color: #28a745;
    font-weight: bold;
}

.schedule-notset {
    color: #dc3545;
    font-weight: bold;
}
.card[data-status="done"] {
    border-left: 6px solid #28a745;
}

.card[data-status="writing"] {
    border-left: 6px solid #ffc107;
}

.card[data-status="notyet"] {
    border-left: 6px solid #dc3545;
}
.card.schedule {
    border-left: 5px solid #4da6ff;
}
.done-task {
    color: gray;
    text-decoration: line-through;
}

</style>
<head>
    <title>小説管理ツール</title>
</head>
<body>

    <p>研究主任の初プログラム🥺💞</p>

<p>未着手：<span id="notyetCount"></span></p>

</div>
<h2>🔥今やる話</h2>

<div class="card">
    <h3>XXIV その牙は、チリのために</h3>

</div>
<h2>次回やること</h2>

<input type="checkbox" id="task1">

</body>
</html>
