<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>話数一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>小説管理ツール</h1>
<p>研究主任の初プログラム 🥵💕</p>

<div class="card">
  <a href="index.html">🏠 ホームへ戻る</a>

<h2>📚 ダッシュボード</h2>
 
<div class="next-work-row">

  <a id="nextDraftCard" class="next-work-card" href="#">
    <div class="next-work-title">🔥 次の肉付け</div>
    <div class="next-work-episode">未設定</div>
  </a>

  <a id="nextCleanCard" class="next-work-card" href="#">
    <div class="next-work-title">✍️ 次の清書</div>
    <div class="next-work-episode">未設定</div>
  </a>

  <a id="nextFinalCard" class="next-work-card" href="#">
    <div class="next-work-title">✅ 次の最終確認</div>
    <div class="next-work-episode">未設定</div>
  </a>

  <a id="nextCoverCard" class="next-work-card" href="#">
  <div class="next-work-title">🎨 次の表紙</div>
  <div class="next-work-episode">未設定</div>
</a>

</div>

  <div class="card">
  <h3>📚 シリーズ総文字数</h3>
  <p id="totalCount">0文字</p>
</div>

<div class="schedule-row">

  <div class="schedule-box">
    <div class="schedule-title">
      📅 次回投稿
    </div>

   <div class="schedule-episode" id="nextPostEpisode">
  XXV
</div>

    <div id="nextPostDays" class="schedule-days">
      あと0日
    </div>
  </div>

  <div class="schedule-box">
    <div class="schedule-title">
      📝 次回予約作業
    </div>

   <div class="schedule-episode" id="nextReserveEpisode">
  XXVI
</div>

    <div id="nextReserveDays" class="schedule-days">
      あと0日
    </div>
  </div>

</div>

<div class="stats-row">

  <div class="stat-box">
    <div class="stat-title">投稿済み</div>
    <div class="stat-count" id="postedCount">0話</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">清書中</div>
    <div class="stat-count" id="writingCount">0話</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">未着手</div>
    <div class="stat-count" id="notyetCount">0話</div>
  </div>

</div>


</div>
<div class="card">

  <h2 class="center-title">
    📖 話数一覧
  </h2>

<button onclick="createNewEpisode()">＋ 新規作成</button>

<div class="filter-row">
  <button onclick="filterEpisodes('all')">全部</button>
  <button onclick="filterEpisodes('done')">投稿済み</button>
  <button onclick="filterEpisodes('writing')">清書中</button>
  <button onclick="filterEpisodes('notyet')">未着手</button>
</div>
 <div id="episodeList"></div>

</div>
</div>
<script src="episodes.js"></script>

<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVWPJDnP0X2nPmbg9BxeV3WRZV1DGowZQ",
  authDomain: "novel-tool-c135d.firebaseapp.com",
  databaseURL: "https://novel-tool-c135d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "novel-tool-c135d",
  storageBucket: "novel-tool-c135d.firebasestorage.app",
  messagingSenderId: "14513468450",
  appId: "1:14513468450:web:c5bb27cf1e7a9faf02467b"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
</script>

<script>
const nextPostDate = new Date("2026-06-20");
const today = new Date();

const episodeList = document.getElementById("episodeList");

let total = 0;
let posted = 0;
let writing = 0;
let notyet = 0;

function renderEpisodes() {
  episodeList.innerHTML = "";

  total = 0;
  posted = 0;
  writing = 0;
  notyet = 0;

  episodes.forEach(episode => {
    const firebaseTitle =
      localStorage.getItem("episode" + episode.id + "Title");

    if (firebaseTitle) {
      episode.title = firebaseTitle;
    }

    const finalText =
      localStorage.getItem("episode" + episode.id + "FinalText") || "";

    const pixiv =
      localStorage.getItem("episode" + episode.id + "-pixiv");

    const reserve =
      localStorage.getItem("episode" + episode.id + "-reserve");

    const textDone =
      localStorage.getItem("episode" + episode.id + "-text");

    const postDate =
      localStorage.getItem("episode" + episode.id + "PostDate") || "";

    let statusText = "未着手";
    let statusClass = "not-started";
    let statusData = "notyet";

    if (pixiv === "true") {
      statusText = "投稿済み";
      statusClass = "posted";
      statusData = "done";
      posted++;
    } else if (reserve === "true") {
      statusText = "予約済み";
      statusClass = "reserved";
      statusData = "writing";
      writing++;
    } else if (textDone === "true") {
      statusText = "清書済み";
      statusClass = "clean";
      statusData = "writing";
      writing++;
    } else {
      notyet++;
    }

    total += finalText.length;

    const card = document.createElement("a");
    card.href = "episode.html?id=" + episode.id;
    card.className = "story-card";
    card.dataset.status = statusData;

    card.innerHTML = `
      <img
        src="covers/cover${episode.id}.png"
        class="cover-thumb"
        alt="表紙"
        onerror="this.src='covers/no-cover.png'"
      >

      <div class="story-card-header">
        <h3>${episode.title}</h3>

        <span class="status-badge ${statusClass}">
          ${statusText}
        </span>

        <span class="post-date">
          投稿日：${postDate || "未設定"}
        </span>
      </div>

      <p>${finalText.length}文字</p>
    `;

    episodeList.appendChild(card);
  });

  document.getElementById("totalCount").textContent =
    total.toLocaleString() + "文字";

  document.getElementById("postedCount").textContent = posted + "話";
  document.getElementById("writingCount").textContent = writing + "話";
  document.getElementById("notyetCount").textContent = notyet + "話";
}

database
  .ref("episodes")
  .once("value")
  .then(snapshot => {
    const firebaseEpisodes = snapshot.val();

    if (firebaseEpisodes) {
      Object.keys(firebaseEpisodes).forEach(id => {
        const data = firebaseEpisodes[id];

        const exists = episodes.some(
          episode => episode.id == id
        );

        if (!exists && data.Title) {
          episodes.push({
            id: Number(id),
            title: data.Title
          });
        }

        if (data.Title) {
          localStorage.setItem(
            "episode" + id + "Title",
            data.Title
          );
        }
      });
    }

    episodes.sort((a, b) => a.id - b.id);

    renderEpisodes();
  });

const diffDays = Math.ceil(
  (nextPostDate - today) / (1000 * 60 * 60 * 24)
);

document.getElementById("nextPostDays").textContent =
  "あと" + diffDays + "日";

document.getElementById("nextReserveDays").textContent =
  "あと" + diffDays + "日";

let nextPost = null;
let nextReserve = null;

for (let i = 1; i <= episodes.length; i++) {

  const isPosted =
    localStorage.getItem("episode" + i + "-pixiv")
    === "true";

  if (!isPosted) {

    nextPost = episodes[i - 1];

    if (i < episodes.length) {
      nextReserve = episodes[i];
    }

    break;
  }
}
if (nextPost) {
  document.getElementById("nextPostEpisode")
    .textContent = nextPost.title;
}

if (nextReserve) {
  document.getElementById("nextReserveEpisode")
    .textContent = nextReserve.title;
}

function filterEpisodes(status) {
  const cards = document.querySelectorAll(".story-card");

  cards.forEach(card => {
    if (status === "all" || card.dataset.status === status) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

let nextDraft = null;
let nextClean = null;
let nextFinal = null;

episodes.forEach(episode => {
  const draftText =
    localStorage.getItem("episode" + episode.id + "DraftText") || "";

  const cleanText =
    localStorage.getItem("episode" + episode.id + "CleanText") || "";

  const finalText =
    localStorage.getItem("episode" + episode.id + "FinalText") || "";

  const textDone =
    localStorage.getItem("episode" + episode.id + "-text");

  const pixiv =
    localStorage.getItem("episode" + episode.id + "-pixiv");

  if (!nextDraft && draftText.length === 0) {
    nextDraft = episode;
  }

  if (!nextClean && draftText.length > 0 && cleanText.length === 0) {
    nextClean = episode;
  }

  if (!nextFinal && cleanText.length > 0 && finalText.length === 0 && pixiv !== "true") {
    nextFinal = episode;
  }
});

function setNextWork(cardId, episode) {
  const card = document.getElementById(cardId);
  const title = card.querySelector(".next-work-episode");

  if (episode) {
    title.textContent = episode.title;
    card.href = "episode.html?id=" + episode.id;
  } else {
    title.textContent = "なし";
    card.href = "#";
  }
}

setNextWork("nextDraftCard", nextDraft);
setNextWork("nextCleanCard", nextClean);
setNextWork("nextFinalCard", nextFinal);

let nextCover = null;

episodes.forEach(episode => {
  const coverDone =
    localStorage.getItem("episode" + episode.id + "-cover");

  if (!nextCover && coverDone !== "true") {
    nextCover = episode;
  }
});

setNextWork("nextCoverCard", nextCover);

async function createNewEpisode() {
  const snapshot = await database.ref("episodes").once("value");
  const firebaseEpisodes = snapshot.val() || {};

  const ids = [
    ...episodes.map(episode => Number(episode.id)),
    ...Object.keys(firebaseEpisodes).map(id => Number(id))
  ].filter(id => id < 100 && !isNaN(id));

  const nextId = Math.max(...ids) + 1;

  console.log("新規作成ID:", nextId);

  location.href = "episode.html?id=" + nextId;
}

</script>
</body>
</html>
